name: daniel-silva-photography
region: nyc

services:
  - name: backend
    github:
      repo: erlingacosta/daniel-silva-photography
      branch: main
      deploy_on_push: true
    source_dir: backend
    build_command: pip install -r requirements.txt
    run_command: python main.py
    http_port: 8000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: DATABASE_URL
        value: postgresql://${db.username}:${db.password}@${db.host}:${db.port}/${db.database}?sslmode=require
      - key: SECRET_KEY
        value: ${SECRET_KEY}
      - key: STRIPE_SECRET_KEY
        value: ${STRIPE_SECRET_KEY}
      - key: STRIPE_PUBLISHABLE_KEY
        value: ${STRIPE_PUBLISHABLE_KEY}
      - key: SENDGRID_API_KEY
        value: ${SENDGRID_API_KEY}
      - key: SENDGRID_FROM_EMAIL
        value: contact@danielsilva.photo
      - key: CORS_ORIGINS
        value: https://${app.domain},http://localhost:3000,http://localhost
      - key: DEBUG
        value: "False"
    health_check:
      http_path: /health

  - name: frontend
    github:
      repo: erlingacosta/daniel-silva-photography
      branch: main
      deploy_on_push: true
    source_dir: frontend
    build_command: npm install && npm run build
    run_command: npx next start -p 3000
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    envs:
      - key: NEXT_PUBLIC_API_URL
        value: https://${app.domain}/api

databases:
  - name: db
    engine: PG
    version: "16"
    production: false
