name: daniel-silva-photography
services:
- name: backend
  github:
    repo: erlingacosta/daniel-silva-photography
    branch: main
  source_dir: backend
  http_port: 8000
  build_command: pip install -r requirements.txt
  run_command: alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000
  envs:
  - key: DATABASE_URL
    value: ${db.username}:${db.password}@${db.host}:${db.port}/${db.database}
  - key: SECRET_KEY
    value: ${SECRET_KEY}
  - key: STRIPE_SECRET_KEY
    value: ${STRIPE_SECRET_KEY}
  - key: STRIPE_PUBLISHABLE_KEY
    value: ${STRIPE_PUBLISHABLE_KEY}
  - key: SENDGRID_API_KEY
    value: ${SENDGRID_API_KEY}
  - key: SENDGRID_FROM_EMAIL
    value: contact@danielsilva.photo
  - key: CORS_ORIGINS
    value: https://${frontend.domains[0]}
  - key: DEBUG
    value: "False"
  health_check:
    http_path: /health
  http_port: 8000

- name: frontend
  github:
    repo: erlingacosta/daniel-silva-photography
    branch: main
  source_dir: frontend
  build_command: npm install && npm run build
  run_command: npm start
  envs:
  - key: NEXT_PUBLIC_API_URL
    value: https://${backend.domains[0]}
  http_port: 3000

databases:
- name: db
  engine: PG
  version: "16"
  production: true
