version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: daniel_silva_db
    environment:
      POSTGRES_USER: daniel
      POSTGRES_PASSWORD: danielsilva
      POSTGRES_DB: daniel_silva_photo
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U daniel"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: daniel_silva_backend
    environment:
      DATABASE_URL: postgresql://daniel:danielsilva@db:5432/daniel_silva_photo
      SECRET_KEY: your-super-secret-key-change-in-production
      STRIPE_SECRET_KEY: sk_test_
      STRIPE_PUBLISHABLE_KEY: pk_test_
      SENDGRID_API_KEY: SG.
      SENDGRID_FROM_EMAIL: contact@danielsilva.photo
      CORS_ORIGINS: http://localhost:3000,http://localhost
      DEBUG: "False"
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: daniel_silva_frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_
    ports:
      - "3001:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: daniel_silva_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
